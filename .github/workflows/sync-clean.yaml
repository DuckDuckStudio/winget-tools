name: winget-pkgs 清理分支和同步修改

on:
  schedule:
    - cron: 0 */5 * * * # 每 5 小时运行一次
  workflow_dispatch:

permissions: {}

jobs:
  sync-clean:
    runs-on: ubuntu-latest
    environment: WINGET-PKGS-TOKEN-ENV

    steps:
      - name: 设置 Rust
        # 用于后续的 `cargo binstall` 安装
        uses: cargo-bins/cargo-binstall@dc19f1e48450eefe5a29b8da6c6b00a87d730b37 # v1.18.1
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: 安装 Komac
        run: cargo binstall komac -y
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: 同步上游修改
        env:
          KOMAC_FORK_OWNER: "DuckDuckStudio"
          GITHUB_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
        run: komac sync-fork

      - name: 清理已合并分支
        env:
          KOMAC_FORK_OWNER: "DuckDuckStudio"
          GITHUB_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
        run: komac cleanup --only-merged
