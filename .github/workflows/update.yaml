name: 不修改的更新清单

on:
  workflow_dispatch:
    inputs:
      id:
        description: 软件包标识符
        required: true
      ver:
        description: 软件包版本
        required: true
      urls:
        description: 软件包安装程序链接
        required: true
      issue:
        description: 解决的 Issue
        required: false
      submit:
        type: boolean
        description: 提交更新
        required: true
        default: true

permissions:
  contents: read

jobs:
  komac-update:
    runs-on: ubuntu-latest
    environment: WINGET-PKGS-TOKEN-ENV

    steps:
    - name: 设置 Rust
    # 用于后续的 `cargo binstall` 安装
      uses: cargo-bins/cargo-binstall@v1.17.8
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: 安装 Komac
      run: cargo binstall komac -y
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: 更新清单
      env:
        KOMAC_FORK_OWNER: "DuckDuckStudio"
        GITHUB_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
        GITHUB_EVENT_INPUTS_SUBMIT: ${{ github.event.inputs.submit }}
        GITHUB_EVENT_INPUTS_ISSUE: ${{ github.event.inputs.issue }}
        GITHUB_EVENT_INPUTS_ID: ${{ github.event.inputs.id }}
        GITHUB_EVENT_INPUTS_VER: ${{ github.event.inputs.ver }}
        GITHUB_EVENT_INPUTS_URLS: ${{ github.event.inputs.urls }}
      run: |-
        if [ ${GITHUB_EVENT_INPUTS_SUBMIT} = true ]; then
          if [ -n "${GITHUB_EVENT_INPUTS_ISSUE}" ]; then
            komac update "${GITHUB_EVENT_INPUTS_ID}" --version "${GITHUB_EVENT_INPUTS_VER}" --urls "${GITHUB_EVENT_INPUTS_URLS}" --created-with "@DuckDuckStudio's Automation" --created-with-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" --submit --resolves "${GITHUB_EVENT_INPUTS_ISSUE}"
          else
            komac update "${GITHUB_EVENT_INPUTS_ID}" --version "${GITHUB_EVENT_INPUTS_VER}" --urls "${GITHUB_EVENT_INPUTS_URLS}" --created-with "@DuckDuckStudio's Automation" --created-with-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" --submit
          fi
        else
          komac update "${GITHUB_EVENT_INPUTS_ID}" --version "${GITHUB_EVENT_INPUTS_VER}" --urls "${GITHUB_EVENT_INPUTS_URLS}" --created-with "@DuckDuckStudio's Automation" --created-with-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" --dry-run
        fi
