name: 检查链接有效性

on:
  workflow_dispatch:
    inputs:
      fail_level:
        type: choice
        description: 错误等级
        required: true
        default: 默认
        options:
          - 默认
          - 错误
          - 详细
          - 不失败
      fork:
        description: 检查的 fork 仓库的所有者
        required: true
        default: microsoft
      branch:
        description: 检查的分支
        required: true
        default: master
      max_concurrency:
        description: 最大并发数
        required: false
        # 有默认 8
        default: "8"
      mode:
        type: choice
        description: 生成模式
        required: true
        default: Release
        options:
          - Release
          - Debug

permissions: {}

jobs:
  Check-installers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 完整
        subdirectory: ["1", "2", "3", "4", "5", "6", "7", "8", "a", "b", "c", "d", "e", "f", "g", "h", "i", "j", "k", "l", "m", "n", "o", "p", "q", "r", "s", "t", "u", "v", "w", "x", "y", "z"]
        # 仅字母
        # subdirectory: ["a", "b", "c", "d", "e", "f", "g", "h", "i", "j", "k", "l", "m", "n", "o", "p", "q", "r", "s", "t", "u", "v", "w", "x", "y", "z"]
    steps:
      - name: 检出代码
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 设置 .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.x

      - name: 克隆 winget-pkgs fork
        env:
          INPUTS_FORK: ${{ inputs.fork }}
          INPUTS_BRANCH: ${{ inputs.branch }}
        run: git clone "https://github.com/${INPUTS_FORK}/winget-pkgs" "winget-pkgs" -b ${INPUTS_BRANCH} --depth 1

      - name: 执行检查
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INPUTS_MAX_CONCURRENCY: ${{ inputs.max_concurrency }}
        run: dotnet run --project "checker/checker.csproj" --configuration ${{ inputs.mode }} -- ${{ matrix.subdirectory }} ${{ inputs.fail_level }} ${INPUTS_MAX_CONCURRENCY}
        continue-on-error: ${{ inputs.fail_level == '不失败' }}
